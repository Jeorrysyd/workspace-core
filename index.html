<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prism</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/base.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <header class="topbar">
      <h1 class="topbar-title" id="app-title">Prism</h1>
      <div class="topbar-right">
        <span id="clock"></span>
      </div>
    </header>

    <main class="main-content">
      <div class="module-container" id="module-container">
        <!-- Pipeline module injected here -->
      </div>

      <!-- Status bar -->
      <div class="statusbar">
        <div class="statusbar-left">
          <span><span class="status-dot"></span><span id="status-text">Ready</span></span>
        </div>
        <div class="statusbar-right">
          <span id="memory-count"></span>
        </div>
      </div>
    </main>
  </div>

  <!-- Core -->
  <script src="/js/shared.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>

  <!-- Pipeline Module -->
  <script src="/modules/pipeline/index.js"></script>
</body>
</html>
