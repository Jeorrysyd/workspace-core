<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Content Pipeline</title>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header" id="sidebar-home" style="cursor:pointer;" title="回到首页">
        <h2 id="app-owner-name">AI</h2>
        <div class="subtitle" id="app-subtitle">Content Pipeline</div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Nav items injected by app.js -->
      </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="module-container" id="module-container">
        <!-- Pipeline module injected here -->
      </div>

      <!-- Status bar -->
      <div class="statusbar">
        <div class="statusbar-left">
          <span><span class="status-dot"></span><span id="status-text">Ready</span></span>
        </div>
        <div class="statusbar-right">
          <span id="memory-count"></span>
          <span id="clock"></span>
        </div>
      </div>
    </main>
  </div>

  <!-- Core -->
  <script src="/js/shared.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>

  <!-- Pipeline Module -->
  <script src="/modules/pipeline/index.js"></script>
</body>
</html>
